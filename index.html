<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Heuk Sung Schedule</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Pretendard', sans-serif;
    background: url('default-bg.jpg') no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
}

/* 배경 업로드 버튼 */
.bg-upload {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
}

/* 상단 타이틀 */
.title {
    font-size: 60px;
    font-weight: bold;
    color: white;
    margin-bottom: 40px;
    text-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* 스케줄 카드 */
.schedule {
    width: 900px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* 하루 박스 */
.day-box {
    display: flex;
    align-items: center;
    padding: 18px 24px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
    background: rgba(255, 215, 0, 0.65); /* 반투명 */
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* 요일 */
.day {
    font-size: 36px;
    font-weight: bold;
    width: 80px;
    color: white;
}

/* 내용 영역 */
.content {
    flex: 1;
    display: flex;
    gap: 20px;
    align-items: center;
}

/* 시간 */
.time-input {
    width: 160px;
    font-size: 24px;
    padding: 6px 10px;
    border-radius: 10px;
    border: none;
}

/* 내용 */
.text-input {
    flex: 1;
    font-size: 24px;
    padding: 6px 10px;
    border-radius: 10px;
    border: none;
}

/* 입력창 디자인 */
input {
    background: rgba(255,255,255,0.85);
}
</style>
</head>
<body>

<input type="file" class="bg-upload" accept="image/*" onchange="changeBG(event)" title="배경 업로드">

<div class="title">⭐ Heuk Sung ⭐</div>

<div class="schedule">

    <div class="day-box">
        <div class="day">일</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">월</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">화</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">수</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">목</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">금</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

    <div class="day-box">
        <div class="day">토</div>
        <div class="content">
            <input class="time-input" placeholder="시간 입력">
            <input class="text-input" placeholder="내용 입력">
        </div>
    </div>

</div>

<script>
function changeBG(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.body.style.background =
            "url('" + e.target.result + "') no-repeat center center fixed";
        document.body.style.backgroundSize = "cover";
    };
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
