<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heuk Sung Schedule</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --purpleA: rgba(170, 120, 255, 0.15);
  --goldA: rgba(255, 210, 90, 0.15);
}

body {
    font-family: 'Jua', sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px; /* 여백 늘려서 잘림 방지 */
}

.controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 200;
    display: flex;
    gap: 10px;
}

.bg-upload {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: rgba(0,0,0,0.6);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.bg-upload input{ display:none; }

.ctrl-btn {
    height: 44px;
    padding: 0 14px;
    border-radius: 14px;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    font-weight: 900;
}

#capture {
    width: min(1000px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    background: url('default-bg.jpg') no-repeat center center;
    background-size: cover;
    padding: 60px 40px 80px; /* 상하 여백 크게 */
    border-radius: 20px;
    overflow: visible;
}

.title {
    font-size: 64px;
    font-weight: 900;
    color: white;
    margin-bottom: 40px;
    text-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.schedule {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 22px;
}

.day-box {
    display: flex;
    align-items: center;
    padding: 20px 26px;
    border-radius: 52px;
    background: linear-gradient(90deg, var(--purpleA), var(--goldA));
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.day {
    font-size: 40px;
    font-weight: 900;
    width: 90px;
    color: white;

    /* 폰트 테두리 추가 */
    -webkit-text-stroke: 2px rgba(0,0,0,0.7);
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
}

.content {
    flex: 1;
    display: flex;
    gap: 16px;
}

.time-input, .text-input {
    font-family: inherit;
    font-weight: 900;
    font-size: 28px;
    padding: 10px 14px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.85);
}

.time-input { width: 190px; }
.text-input { flex: 1; }

</style>
</head>
<body>

<div class="controls">
  <label class="bg-upload">📷
    <input type="file" accept="image/*" onchange="changeBG(event)">
  </label>
  <button class="ctrl-btn" onclick="saveJPG()">JPG 저장</button>
</div>

<div id="capture">
  <div class="title">⭐ Heuk Sung ⭐</div>

  <div class="schedule">

      <div class="day-box">
          <div class="day">일</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">월</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">화</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">수</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">목</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">금</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

      <div class="day-box">
          <div class="day">토</div>
          <div class="content">
              <input class="time-input" placeholder="시간 입력">
              <input class="text-input" placeholder="내용 입력">
          </div>
      </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
function changeBG(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const cap = document.getElementById("capture");
        cap.style.background = "url('" + e.target.result + "') no-repeat center center";
        cap.style.backgroundSize = "cover";
    };
    reader.readAsDataURL(file);
}

async function saveJPG(){
  const target = document.getElementById('capture');
  if (document.activeElement) document.activeElement.blur();

  const canvas = await html2canvas(target, {
    scale: 3,  // 해상도 증가 + 잘림 방지
    useCORS: true
  });

  const jpg = canvas.toDataURL('image/jpeg', 0.98);
  const a = document.createElement('a');
  a.href = jpg;
  a.download = 'schedule.jpg';
  a.click();
}
</script>

</body>
</html>
